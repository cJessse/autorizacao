databases:
  - name: autorizacao-db
    databaseName: autorizacao_db
    user: admin
    plan: free

services:
  # Backend API (Web Service)
  - type: web
    name: autorizacao-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: autorizacao-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: API_G1_URL
        value: https://pacientes-1a6g.onrender.com/paciente
      - key: API_G1_TOKEN
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c3VhcmlvIjoidXN1YXJpbyIsImlhdCI6MTc4MTY1MTM4MSwiZXhwIjoxNzgxNjgwMTgxfQ.5Ou-f0iCJrGtrTBWcp4oKIs9RkFBwcHvH-4quPI9lNI

  # Frontend Web App (Static Site)
  - type: web
    name: autorizacao-web
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://autorizacao-api.onrender.com/api
